<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover - это самое важное правило для iOS, чтобы приложение понимало границы челки и подбородка -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- Делает статус-бар прозрачным, чтобы приложение сливалось с системой -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Дневник питания</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      /* Фоновый цвет приложения (очень темный, почти черный) */
      --bg-app: #09090b; 
      --bg-card: #18181b;
    }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    
    body { 
      background-color: var(--bg-app); 
      margin: 0; 
      padding: 0; 
      /* Убирает эффект резиновой прокрутки страницы за пределы контента на iOS */
      overscroll-behavior-y: none; 
      /* Отключаем выделение при тапе */
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* Специальные классы для работы с "подбородком" и "челкой" iPhone */
    .ios-safe-top {
      padding-top: calc(env(safe-area-inset-top) + 16px);
    }
    .ios-safe-bottom-nav {
      /* Тянем фон панели до самого низа экрана + даем отступ самим кнопкам */
      padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
      padding-top: 12px;
    }
    .ios-safe-main-padding {
      /* Чтобы контент можно было доскроллить до конца, не пряча под навигацией */
      padding-bottom: calc(env(safe-area-inset-bottom) + 100px);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // --- Иконки (в стиле скриншота) ---
    const IconPlus = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14m-7-7h14"/></svg>;
    const IconBook = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;
    const IconCalendar = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const IconChevronLeft = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
    const IconChevronRight = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const IconSparkles = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
    const IconLoader = ({className}) => <svg className={`animate-spin ${className}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
    const IconX = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>;

    // Утилиты дат
    const getLocalDateString = (dateObj) => {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const displayDate = (dateString) => {
      const [year, month, day] = dateString.split('-');
      const d = new Date(year, month - 1, day);
      const todayStr = getLocalDateString(new Date());
      if (dateString === todayStr) return 'Сегодня';
      
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      if (dateString === getLocalDateString(yesterday)) return 'Вчера';

      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
    };

    const calculateCalories = (grams, calPer100) => Math.round((grams / 100) * calPer100);

    const DAILY_GOAL = 2000; // Цель калорий в день

    function App() {
      const [foods, setFoods] = useState(() => {
        try {
          const saved = localStorage.getItem('premiumCalorie_foods');
          if (saved) return JSON.parse(saved);
        } catch (e) {}
        return [
          { id: '1', name: 'Куриное филе', calories: 113 },
          { id: '2', name: 'Гречка (вареная)', calories: 132 },
          { id: '3', name: 'Банан', calories: 89 },
        ];
      });

      const [dailyLogs, setDailyLogs] = useState(() => {
        try {
          const saved = localStorage.getItem('premiumCalorie_logs');
          if (saved) return JSON.parse(saved);
        } catch (e) {}
        return {};
      });

      const [currentDate, setCurrentDate] = useState(getLocalDateString(new Date()));
      const [activeTab, setActiveTab] = useState('diary');
      const [selectedFoodId, setSelectedFoodId] = useState('');
      const [gramsInput, setGramsInput] = useState('');
      const [newFoodName, setNewFoodName] = useState('');
      const [newFoodCals, setNewFoodCals] = useState('');
      const [isFetchingCals, setIsFetchingCals] = useState(false);

      // Состояния для ИИ Нейро-диетолога
      const [aiLoading, setAiLoading] = useState(false);
      const [aiModalOpen, setAiModalOpen] = useState(false);
      const [aiAdvice, setAiAdvice] = useState('');

      useEffect(() => { localStorage.setItem('premiumCalorie_foods', JSON.stringify(foods)); }, [foods]);
      useEffect(() => { localStorage.setItem('premiumCalorie_logs', JSON.stringify(dailyLogs)); }, [dailyLogs]);

      const handleAddFood = (e) => {
        e.preventDefault();
        if (!newFoodName.trim() || !newFoodCals) return;
        setFoods([...foods, { id: Date.now().toString(), name: newFoodName.trim(), calories: parseFloat(newFoodCals) }]);
        setNewFoodName(''); setNewFoodCals('');
      };

      const handleAddLog = (e) => {
        e.preventDefault();
        const food = foods.find(f => f.id === selectedFoodId);
        if (!food || !gramsInput) return;
        
        const newLog = {
          id: Date.now().toString(),
          foodId: food.id,
          grams: parseFloat(gramsInput),
          totalCalories: calculateCalories(parseFloat(gramsInput), food.calories)
        };

        setDailyLogs(prev => ({ ...prev, [currentDate]: [...(prev[currentDate] || []), newLog] }));
        setSelectedFoodId(''); setGramsInput('');
      };

      const currentDayLogs = dailyLogs[currentDate] || [];
      const totalDailyCalories = currentDayLogs.reduce((sum, log) => sum + log.totalCalories, 0);
      const remainingCalories = Math.max(0, DAILY_GOAL - totalDailyCalories);
      const progressPercent = Math.min(100, (totalDailyCalories / DAILY_GOAL) * 100);

      // Авто-поиск калорий через Gemini
      const handleFetchCalories = async () => {
        if (!newFoodName.trim()) return;
        setIsFetchingCals(true);
        try {
          const apiKey = ""; // Ключ API будет подставлен окружением
          const prompt = `Сколько калорий в 100 граммах продукта "${newFoodName.trim()}"? Верни ТОЛЬКО ОДНО ЧИСЛО (целое или с точкой), без текста, без пояснений и без "ккал".`;
          
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });

          if (!response.ok) throw new Error('API Error');
          const data = await response.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
          
          // Вытаскиваем число из ответа (заменяем запятые на точки для дробных чисел)
          const match = text.replace(',', '.').match(/\d+(\.\d+)?/);
          if (match) {
            setNewFoodCals(match[0]);
          }
        } catch (error) {
          console.error("Ошибка ИИ при поиске калорий:", error);
        } finally {
          setIsFetchingCals(false);
        }
      };

      // Функция вызова Gemini API
      const handleGetAdvice = async () => {
        setAiLoading(true);
        setAiModalOpen(true);
        setAiAdvice('');
        
        try {
          const apiKey = ""; // Ключ API будет подставлен окружением
          
          let foodSummary = "Я еще ничего не ел сегодня.";
          if (currentDayLogs.length > 0) {
            const items = currentDayLogs.map(log => {
              const food = foods.find(f => f.id === log.foodId);
              return food ? `${food.name} (${log.grams}г)` : `Неизвестно (${log.grams}г)`;
            });
            foodSummary = `Сегодня я съел: ${items.join(', ')}.`;
          }

          const prompt = `Ты - профессиональный и дружелюбный "Нейро-диетолог" в трекере калорий. 
Моя дневная цель: ${DAILY_GOAL} ккал. Мой текущий прогресс: ${totalDailyCalories} ккал.
${foodSummary}

Проанализируй мой рацион и дай ОЧЕНЬ КОРОТКИЙ (максимум 2-3 предложения) и мотивирующий совет. 
Используй 1-2 эмодзи. Отвечай на русском языке.`;

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              systemInstruction: { parts: [{ text: "Ты заботливый ИИ-диетолог. Давай короткие, практичные и добрые советы." }] }
            })
          });

          if (!response.ok) throw new Error('API Error');
          const data = await response.json();
          const adviceText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Извините, совет не сгенерировался.";
          setAiAdvice(adviceText);
        } catch (error) {
          console.error("Ошибка ИИ:", error);
          setAiAdvice("Ой, кажется, серверы нейросети перегружены. Попробуйте получить совет чуть позже! 🍏");
        } finally {
          setAiLoading(false);
        }
      };

      return (
        <div className="min-h-screen text-zinc-100 font-sans flex justify-center bg-black">
          <div className="w-full max-w-md h-[100dvh] flex flex-col relative" style={{ backgroundColor: 'var(--bg-app)' }}>
            
            {/* ШАПКА: Заголовок приложения */}
            <header className="ios-safe-top px-6 flex justify-center items-center z-10 bg-[#09090b]/90 backdrop-blur-md sticky top-0 pb-4">
              <h1 className="text-lg font-semibold tracking-wide text-zinc-100">
                {activeTab === 'diary' ? 'Дневник питания' : 'Справочник'}
              </h1>
            </header>

            {/* СКРОЛЛИРУЕМАЯ ОБЛАСТЬ */}
            <main className="flex-1 overflow-y-auto px-5 ios-safe-main-padding space-y-5">
              
              {activeTab === 'diary' && (
                <>
                  {/* Навигация по датам (стиль из макета) */}
                  <div className="flex items-center justify-between bg-[#18181b] rounded-2xl p-2 mt-2">
                    <button onClick={() => {const d = new Date(currentDate); d.setDate(d.getDate()-1); setCurrentDate(getLocalDateString(d));}} className="p-3 text-zinc-400 active:bg-zinc-800 rounded-xl transition-colors">
                      <IconChevronLeft className="w-5 h-5" />
                    </button>
                    <div className="font-medium text-zinc-200">{displayDate(currentDate)}</div>
                    <button onClick={() => {const d = new Date(currentDate); d.setDate(d.getDate()+1); setCurrentDate(getLocalDateString(d));}} 
                            disabled={currentDate === getLocalDateString(new Date())} className="p-3 text-zinc-400 active:bg-zinc-800 rounded-xl disabled:opacity-30 transition-colors">
                      <IconChevronRight className="w-5 h-5" />
                    </button>
                  </div>

                  {/* Карточка прогресса (Съедено / Осталось) */}
                  <div className="bg-[#18181b] rounded-3xl p-5 shadow-lg shadow-black/20">
                    <div className="flex justify-between items-end mb-4">
                      <div>
                        <p className="text-xs text-zinc-400 font-medium mb-1">Съедено</p>
                        <div className="text-zinc-100 font-semibold flex items-baseline gap-1">
                          <span className="text-3xl">{totalDailyCalories}</span>
                          <span className="text-sm text-zinc-500 font-medium">/ {DAILY_GOAL}</span>
                        </div>
                      </div>
                      <div className="text-right">
                        <p className="text-xs text-zinc-400 font-medium mb-1">Осталось</p>
                        <div className="text-emerald-400 font-semibold flex items-baseline gap-1 justify-end">
                          <span className="text-2xl">{remainingCalories}</span>
                          <span className="text-xs text-zinc-400">ккал</span>
                        </div>
                      </div>
                    </div>
                    {/* Прогресс-бар */}
                    <div className="h-2.5 w-full bg-[#27272a] rounded-full overflow-hidden">
                      <div className="h-full bg-emerald-500 rounded-full transition-all duration-500 ease-out" style={{ width: `${progressPercent}%` }}></div>
                    </div>
                  </div>

                  {/* Баннер Нейро-диетолог */}
                  <div className="bg-[#18181b] rounded-3xl p-4 flex items-center justify-between border border-[#27272a]">
                    <div className="flex items-center gap-2">
                      <IconSparkles className="w-5 h-5 text-amber-300" />
                      <span className="text-xs font-bold text-emerald-400 tracking-widest uppercase">Нейро-диетолог</span>
                    </div>
                    <button 
                      onClick={handleGetAdvice}
                      disabled={aiLoading}
                      className="bg-[#27272a] hover:bg-zinc-700 active:bg-zinc-600 disabled:opacity-50 text-zinc-300 text-xs font-semibold px-4 py-2 rounded-full transition-colors flex items-center gap-2"
                    >
                      {aiLoading ? <IconLoader className="w-4 h-4" /> : 'Получить совет ✨'}
                    </button>
                  </div>

                  {/* Карточка добавления приема пищи */}
                  <form onSubmit={handleAddLog} className="bg-[#18181b] rounded-3xl p-5 shadow-lg">
                    <h2 className="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-4">Добавить приём пищи</h2>
                    <div className="space-y-3">
                      <div className="relative">
                        <select className="w-full bg-[#27272a] text-zinc-200 rounded-2xl px-4 py-4 outline-none appearance-none" value={selectedFoodId} onChange={(e) => setSelectedFoodId(e.target.value)} required>
                          <option value="" disabled className="text-zinc-500">Выберите продукт...</option>
                          {foods.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                        </select>
                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-zinc-500">
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                      </div>

                      <div className="flex gap-3">
                        <div className="flex-1 relative">
                          <input type="number" placeholder="0" min="1" className="w-full bg-[#27272a] text-zinc-200 rounded-2xl px-4 py-4 pr-12 outline-none placeholder:text-zinc-600" value={gramsInput} onChange={(e) => setGramsInput(e.target.value)} required />
                          <span className="absolute right-5 top-1/2 -translate-y-1/2 text-zinc-500 font-medium text-sm">г</span>
                        </div>
                        <button type="submit" disabled={!selectedFoodId || !gramsInput} className="bg-[#27272a] active:bg-emerald-600/20 text-zinc-400 active:text-emerald-500 disabled:opacity-50 w-14 rounded-2xl flex items-center justify-center transition-colors">
                          <IconPlus className="w-6 h-6" />
                        </button>
                      </div>
                    </div>
                  </form>

                  {/* История за день */}
                  <div>
                    <h2 className="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-4 px-1 mt-6">История за день</h2>
                    {currentDayLogs.length === 0 ? (
                      <div className="text-center py-8 text-zinc-600 font-medium text-sm">Ничего не найдено</div>
                    ) : (
                      <div className="space-y-3">
                        {currentDayLogs.map(log => {
                          const food = foods.find(f => f.id === log.foodId);
                          return (
                            <div key={log.id} className="flex items-center justify-between bg-[#18181b] rounded-2xl p-4">
                              <div>
                                <p className="font-semibold text-zinc-200 text-sm mb-0.5">{food ? food.name : 'Удалено'}</p>
                                <p className="text-xs text-zinc-500">{log.grams} г</p>
                              </div>
                              <div className="flex items-center gap-4">
                                <span className="font-semibold text-zinc-300 text-sm">{log.totalCalories} ккал</span>
                                <button onClick={() => setDailyLogs(p => ({...p, [currentDate]: p[currentDate].filter(l => l.id !== log.id)}))} className="text-zinc-600 active:text-red-400 p-1">
                                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                              </div>
                            </div>
                          )
                        })}
                      </div>
                    )}
                  </div>
                </>
              )}

              {activeTab === 'directory' && (
                <>
                  <form onSubmit={handleAddFood} className="bg-[#18181b] rounded-3xl p-5 shadow-lg mt-2">
                     <h2 className="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-4 flex items-center gap-2">Создать продукт</h2>
                     <div className="space-y-3">
                       <div className="relative">
                         <input type="text" placeholder="Название (например, Яблоко)" className="w-full bg-[#27272a] text-zinc-200 rounded-2xl px-4 py-4 pr-14 outline-none placeholder:text-zinc-600" value={newFoodName} onChange={(e) => setNewFoodName(e.target.value)} required />
                         <button 
                           type="button" 
                           onClick={handleFetchCalories}
                           disabled={!newFoodName.trim() || isFetchingCals}
                           className="absolute right-2 top-1/2 -translate-y-1/2 p-2 text-emerald-500 hover:text-emerald-400 disabled:text-zinc-600 transition-colors"
                           title="Узнать калории у ИИ"
                         >
                           {isFetchingCals ? <IconLoader className="w-5 h-5" /> : <IconSparkles className="w-5 h-5" />}
                         </button>
                       </div>
                       <div className="flex gap-3">
                          <div className="flex-1 relative">
                            <input type="number" placeholder="0" min="1" step="0.1" className="w-full bg-[#27272a] text-zinc-200 rounded-2xl px-4 py-4 pr-16 outline-none placeholder:text-zinc-600" value={newFoodCals} onChange={(e) => setNewFoodCals(e.target.value)} required />
                            <span className="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 text-xs font-medium">ккал</span>
                          </div>
                          <button type="submit" disabled={!newFoodName || !newFoodCals} className="bg-emerald-600 disabled:bg-[#27272a] disabled:text-zinc-600 text-zinc-100 font-semibold px-6 rounded-2xl transition-colors">Добавить</button>
                       </div>
                     </div>
                  </form>

                  <div>
                    <h2 className="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-4 px-1 mt-6">Справочник ({foods.length})</h2>
                    <div className="space-y-3">
                      {foods.map(food => (
                        <div key={food.id} className="flex items-center justify-between bg-[#18181b] rounded-2xl p-4">
                          <div className="flex-1 pr-4">
                            <p className="font-semibold text-zinc-200 text-sm mb-0.5">{food.name}</p>
                            <p className="text-xs text-zinc-500">{food.calories} ккал на 100 г</p>
                          </div>
                          <button onClick={() => setFoods(foods.filter(f => f.id !== food.id))} className="text-zinc-600 active:text-red-400 p-2">
                             <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                </>
              )}
            </main>

            {/* НИЖНЯЯ НАВИГАЦИЯ (Идеальный подбородок) */}
            <nav className="absolute bottom-0 w-full z-20 bg-[#09090b] border-t border-zinc-800/50 ios-safe-bottom-nav">
              <div className="flex justify-around items-center px-2">
                <button onClick={() => setActiveTab('diary')} className={`flex flex-col items-center w-24 gap-1 ${activeTab === 'diary' ? 'text-emerald-400' : 'text-zinc-500'}`}>
                  <IconCalendar className="w-6 h-6" />
                  <span className="text-[10px] font-bold tracking-wider">Дневник</span>
                </button>
                <button onClick={() => setActiveTab('directory')} className={`flex flex-col items-center w-24 gap-1 ${activeTab === 'directory' ? 'text-emerald-400' : 'text-zinc-500'}`}>
                   <IconBook className="w-6 h-6" />
                  <span className="text-[10px] font-bold tracking-wider">Справочник</span>
                </button>
              </div>
            </nav>

            {/* Модальное окно ИИ-совета */}
            {aiModalOpen && (
              <div className="absolute inset-0 z-50 flex items-center justify-center px-5 bg-black/60 backdrop-blur-sm">
                <div className="bg-[#18181b] border border-zinc-800 rounded-3xl p-6 w-full max-w-sm shadow-2xl relative">
                  <button 
                    onClick={() => setAiModalOpen(false)}
                    className="absolute top-4 right-4 text-zinc-500 hover:text-zinc-300 p-1 transition-colors"
                  >
                    <IconX className="w-5 h-5" />
                  </button>
                  
                  <div className="flex items-center gap-3 mb-4">
                    <div className="bg-emerald-500/10 p-2 rounded-xl">
                      <IconSparkles className="w-6 h-6 text-emerald-400" />
                    </div>
                    <h3 className="text-sm font-bold text-zinc-100 uppercase tracking-wider">Ваш Нейро-диетолог</h3>
                  </div>
                  
                  <div className="text-zinc-300 text-sm leading-relaxed min-h-[60px] flex items-center">
                    {aiLoading ? (
                      <div className="flex items-center gap-3 text-zinc-500 font-medium animate-pulse">
                        <IconLoader className="w-5 h-5 text-emerald-500" />
                        Изучаю ваш рацион за сегодня...
                      </div>
                    ) : (
                      <p>{aiAdvice}</p>
                    )}
                  </div>
                  
                  {!aiLoading && (
                    <button 
                      onClick={() => setAiModalOpen(false)}
                      className="mt-6 w-full bg-[#27272a] hover:bg-zinc-700 active:bg-zinc-600 text-zinc-200 font-semibold py-3 rounded-2xl transition-colors"
                    >
                      Отлично, спасибо!
                    </button>
                  )}
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
