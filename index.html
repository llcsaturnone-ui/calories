<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Калории</title>
  
  <!-- Tailwind CSS для стилей -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React и ReactDOM (Обязательно для работы) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel для чтения React-кода браузером -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Скрываем скроллбар для эстетики мобильного приложения */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    body { background-color: #09090b; margin: 0; padding: 0; overscroll-behavior-y: none; }
    .pb-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Весь код приложения пишется здесь, с типом text/babel -->
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // --- Иконки ---
    const IconPlus = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14m-7-7h14"/></svg>;
    const IconBook = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;
    const IconCalendar = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const IconTrash = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>;
    const IconChevronLeft = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
    const IconChevronRight = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const IconUtensils = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>;

    // --- Утилиты ---
    const getLocalDateString = (dateObj) => {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const displayDate = (dateString) => {
      const [year, month, day] = dateString.split('-');
      const d = new Date(year, month - 1, day);
      const todayStr = getLocalDateString(new Date());
      if (dateString === todayStr) return 'Сегодня';
      
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      if (dateString === getLocalDateString(yesterday)) return 'Вчера';

      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
    };

    const calculateCalories = (grams, calPer100) => Math.round((grams / 100) * calPer100);

    // --- Основной компонент ---
    function App() {
      const [foods, setFoods] = useState(() => {
        try {
          const saved = localStorage.getItem('calorieTracker_foods');
          if (saved) return JSON.parse(saved);
        } catch (e) {}
        return [
          { id: '1', name: 'Яблоко свежее', calories: 52 },
          { id: '2', name: 'Банан', calories: 89 },
          { id: '3', name: 'Куриное филе', calories: 113 },
          { id: '4', name: 'Гречка (вареная)', calories: 132 },
          { id: '5', name: 'Яйцо куриное', calories: 157 },
        ];
      });

      const [dailyLogs, setDailyLogs] = useState(() => {
        try {
          const saved = localStorage.getItem('calorieTracker_logs');
          if (saved) return JSON.parse(saved);
        } catch (e) {}
        return {};
      });

      const [currentDate, setCurrentDate] = useState(getLocalDateString(new Date()));
      const [activeTab, setActiveTab] = useState('diary');
      const [selectedFoodId, setSelectedFoodId] = useState('');
      const [gramsInput, setGramsInput] = useState('');
      const [newFoodName, setNewFoodName] = useState('');
      const [newFoodCals, setNewFoodCals] = useState('');

      useEffect(() => {
        localStorage.setItem('calorieTracker_foods', JSON.stringify(foods));
      }, [foods]);

      useEffect(() => {
        localStorage.setItem('calorieTracker_logs', JSON.stringify(dailyLogs));
      }, [dailyLogs]);

      const handleAddFood = (e) => {
        e.preventDefault();
        if (!newFoodName.trim() || !newFoodCals) return;
        setFoods([...foods, { id: Date.now().toString(), name: newFoodName.trim(), calories: parseFloat(newFoodCals) }]);
        setNewFoodName(''); setNewFoodCals('');
      };

      const handleAddLog = (e) => {
        e.preventDefault();
        const food = foods.find(f => f.id === selectedFoodId);
        if (!food || !gramsInput) return;
        
        const newLog = {
          id: Date.now().toString(),
          foodId: food.id,
          grams: parseFloat(gramsInput),
          totalCalories: calculateCalories(parseFloat(gramsInput), food.calories)
        };

        setDailyLogs(prev => ({
          ...prev,
          [currentDate]: [...(prev[currentDate] || []), newLog]
        }));
        setSelectedFoodId(''); setGramsInput('');
      };

      const handleDeleteLog = (logId) => {
        setDailyLogs(prev => ({
          ...prev,
          [currentDate]: prev[currentDate].filter(log => log.id !== logId)
        }));
      };

      const handleDeleteFood = (foodId) => {
        setFoods(foods.filter(f => f.id !== foodId));
      };

      const currentDayLogs = dailyLogs[currentDate] || [];
      const totalDailyCalories = currentDayLogs.reduce((sum, log) => sum + log.totalCalories, 0);
      
      const previewCalories = useMemo(() => {
        if (selectedFoodId && gramsInput) {
          const food = foods.find(f => f.id === selectedFoodId);
          return food ? calculateCalories(parseFloat(gramsInput), food.calories) : 0;
        }
        return 0;
      }, [selectedFoodId, gramsInput, foods]);

      return (
        <div className="min-h-screen bg-zinc-950 flex justify-center font-sans text-zinc-100">
          <div className="w-full max-w-md bg-zinc-900 shadow-2xl flex flex-col h-[100dvh]">
            
            <header className="px-6 py-5 border-b border-zinc-800 flex items-center justify-between bg-zinc-900 z-10 sticky top-0">
              <h1 className="text-xl font-semibold">{activeTab === 'diary' ? 'Дневник питания' : 'Справочник'}</h1>
              {activeTab === 'diary' && (
                <div className="text-sm font-medium text-emerald-400 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20">
                  {totalDailyCalories} ккал
                </div>
              )}
            </header>

            <main className="flex-1 overflow-y-auto pb-28">
              {activeTab === 'diary' && (
                <div className="p-6 flex flex-col h-full space-y-6">
                  
                  {/* Дата */}
                  <div className="flex items-center justify-between bg-zinc-800/50 rounded-2xl p-2 border border-zinc-800">
                    <button onClick={() => {const d = new Date(currentDate); d.setDate(d.getDate()-1); setCurrentDate(getLocalDateString(d));}} className="p-3 hover:bg-zinc-800 rounded-xl">
                      <IconChevronLeft className="w-5 h-5 text-zinc-400" />
                    </button>
                    <div className="font-medium text-zinc-200">{displayDate(currentDate)}</div>
                    <button onClick={() => {const d = new Date(currentDate); d.setDate(d.getDate()+1); setCurrentDate(getLocalDateString(d));}} 
                            disabled={currentDate === getLocalDateString(new Date())} className="p-3 hover:bg-zinc-800 rounded-xl disabled:opacity-30">
                      <IconChevronRight className="w-5 h-5 text-zinc-400" />
                    </button>
                  </div>

                  {/* Ввод */}
                  <form onSubmit={handleAddLog} className="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 shadow-sm space-y-4">
                    <h2 className="text-sm font-semibold text-zinc-400 uppercase tracking-wider">Что вы съели?</h2>
                    <select className="w-full bg-zinc-800 border border-zinc-700 text-zinc-100 rounded-2xl px-4 py-3.5 outline-none focus:ring-2 focus:ring-emerald-500/30" value={selectedFoodId} onChange={(e) => setSelectedFoodId(e.target.value)} required>
                      <option value="" disabled className="text-zinc-500">Выберите продукт...</option>
                      {foods.map(f => <option key={f.id} value={f.id}>{f.name} ({f.calories} ккал/100г)</option>)}
                    </select>

                    <div className="flex gap-3">
                      <div className="flex-1 relative">
                        <input type="number" placeholder="0" min="1" className="w-full bg-zinc-800 border border-zinc-700 text-zinc-100 rounded-2xl px-4 py-3.5 pr-12 outline-none focus:ring-2 focus:ring-emerald-500/30" value={gramsInput} onChange={(e) => setGramsInput(e.target.value)} required />
                        <span className="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 font-medium">г</span>
                      </div>
                      <button type="submit" disabled={!selectedFoodId || !gramsInput} className="bg-emerald-600 disabled:bg-zinc-800 disabled:text-zinc-600 text-white p-3.5 rounded-2xl flex-shrink-0">
                        <IconPlus className="w-6 h-6" />
                      </button>
                    </div>
                    {previewCalories > 0 && <div className="text-sm text-zinc-400 text-center">Добавит <span className="font-medium text-emerald-400">{previewCalories} ккал</span></div>}
                  </form>

                  {/* Список */}
                  <div>
                    <h2 className="text-sm font-semibold text-zinc-400 uppercase tracking-wider mb-4">Съедено за день</h2>
                    {currentDayLogs.length === 0 ? (
                      <div className="text-center py-10 text-zinc-600 flex flex-col items-center"><IconUtensils className="w-10 h-10 mb-3 opacity-20" /><p>Пока пусто</p></div>
                    ) : (
                      <ul className="space-y-3">
                        {currentDayLogs.map(log => {
                          const food = foods.find(f => f.id === log.foodId);
                          return (
                            <li key={log.id} className="flex items-center justify-between bg-zinc-800/40 border border-zinc-800 rounded-2xl p-4">
                              <div><p className="font-medium text-zinc-100">{food ? food.name : 'Удалено'}</p><p className="text-sm text-zinc-400">{log.grams} г</p></div>
                              <div className="flex items-center gap-4">
                                <span className="font-semibold text-emerald-400">{log.totalCalories} ккал</span>
                                <button onClick={() => handleDeleteLog(log.id)} className="text-zinc-600 hover:text-red-400 p-2 -mr-2"><IconTrash className="w-5 h-5" /></button>
                              </div>
                            </li>
                          )
                        })}
                      </ul>
                    )}
                  </div>
                </div>
              )}

              {activeTab === 'directory' && (
                <div className="p-6 flex flex-col h-full space-y-6">
                  <form onSubmit={handleAddFood} className="bg-emerald-950/20 border border-emerald-500/20 rounded-3xl p-5 space-y-4">
                     <h2 className="text-sm font-semibold text-emerald-400 uppercase tracking-wider flex items-center gap-2"><IconPlus className="w-4 h-4" /> Новый продукт</h2>
                     <input type="text" placeholder="Название" className="w-full bg-zinc-900 border border-zinc-700 text-zinc-100 rounded-2xl px-4 py-3.5 outline-none focus:ring-2 focus:ring-emerald-500/30" value={newFoodName} onChange={(e) => setNewFoodName(e.target.value)} required />
                     <div className="flex gap-3">
                        <div className="flex-1 relative">
                          <input type="number" placeholder="0" min="1" step="0.1" className="w-full bg-zinc-900 border border-zinc-700 text-zinc-100 rounded-2xl px-4 py-3.5 pr-20 outline-none focus:ring-2 focus:ring-emerald-500/30" value={newFoodCals} onChange={(e) => setNewFoodCals(e.target.value)} required />
                          <span className="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 text-sm">ккал</span>
                        </div>
                        <button type="submit" disabled={!newFoodName || !newFoodCals} className="bg-emerald-600 disabled:bg-zinc-800 disabled:text-zinc-600 text-white px-6 py-3.5 rounded-2xl">Сохранить</button>
                     </div>
                  </form>
                  <div>
                    <h2 className="text-sm font-semibold text-zinc-400 uppercase tracking-wider mb-4">Ваши продукты</h2>
                    <ul className="space-y-3">
                      {foods.map(food => (
                        <li key={food.id} className="flex items-center justify-between bg-zinc-800/40 border border-zinc-800 rounded-2xl p-4">
                          <div className="flex-1 pr-4"><p className="font-medium text-zinc-100">{food.name}</p><p className="text-sm text-zinc-400">{food.calories} ккал / 100г</p></div>
                          <button onClick={() => handleDeleteFood(food.id)} className="text-zinc-600 hover:text-red-400 p-2 -mr-2"><IconTrash className="w-5 h-5" /></button>
                        </li>
                      ))}
                    </ul>
                  </div>
                </div>
              )}
            </main>

            <nav className="bg-zinc-900/95 backdrop-blur-md border-t border-zinc-800 flex justify-around items-center fixed bottom-0 w-full max-w-md z-20 pb-safe pt-2">
              <button onClick={() => setActiveTab('diary')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'diary' ? 'text-emerald-400' : 'text-zinc-500'}`}>
                <div className={`p-1.5 rounded-xl mb-1 ${activeTab === 'diary' ? 'bg-emerald-500/10' : ''}`}><IconCalendar className="w-6 h-6" /></div>
                <span className="text-[11px] font-semibold tracking-wide">Дневник</span>
              </button>
              <button onClick={() => setActiveTab('directory')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'directory' ? 'text-emerald-400' : 'text-zinc-500'}`}>
                 <div className={`p-1.5 rounded-xl mb-1 ${activeTab === 'directory' ? 'bg-emerald-500/10' : ''}`}><IconBook className="w-6 h-6" /></div>
                <span className="text-[11px] font-semibold tracking-wide">Справочник</span>
              </button>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
